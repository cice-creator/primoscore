services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - primoscore_data:/app/data
    expose:
      - "4173"
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      PRIMOSCORE_DOMAIN: ${PRIMOSCORE_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
volumes:
  primoscore_data:
  caddy_data:
  caddy_config:
